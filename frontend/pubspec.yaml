name: docucharm_frontend
description: Modern PDF tools mobile app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  file_picker: ^8.1.2
  desktop_drop: ^0.5.0
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  share_plus: ^10.1.2
  open_filex: ^4.5.0
  syncfusion_flutter_pdfviewer: ^27.1.48
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
